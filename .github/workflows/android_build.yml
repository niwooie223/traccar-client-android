name: Android CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Regular Debug Flavor)
      # Building the 'regular' flavor which does not require google-services.json
      run: ./gradlew assembleRegularDebug --info --stacktrace

    - name: Upload debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-regular-debug
        path: app/build/outputs/apk/regular/debug/app-regular-debug.apk

    - name: Upload Build Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          **/build/reports/
          **/build/test-results/